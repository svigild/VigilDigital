<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — VigilDigital</title>
  <meta name="description" content="Artículos sobre diseño web, SEO y estrategia digital para negocios locales.">
  <link rel="stylesheet" href="/css/vigil.css">
  <style>
    .blog-hero {
      padding: 96px 0 64px;
      background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(91,114,247,0.12) 0%, transparent 70%);
      border-bottom: 1px solid rgba(91,114,247,0.08);
    }
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 28px;
      padding: 64px 0 96px;
    }
    .blog-empty {
      grid-column: 1/-1; text-align: center; padding: 80px 0;
      color: rgba(255,255,255,0.25); font-size: 15px;
    }
    .filter-bar {
      display: flex; gap: 10px; flex-wrap: wrap; margin-top: 36px;
    }
    .filter-btn {
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 6px 16px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.12);
      background: transparent; color: rgba(255,255,255,0.45); cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      color: #5b72f7; border-color: rgba(91,114,247,0.5); background: rgba(91,114,247,0.08);
    }
    @media (max-width: 767px) {
      .blog-hero { padding: 80px 0 48px; }
      .blog-grid  { grid-template-columns: 1fr; padding: 48px 0 72px; }
    }
  </style>
</head>
<body>
<div id="scroll-bar"></div>

<nav id="main-nav">
  <a href="/" class="nav-logo">
    <svg width="32" height="32" viewBox="0 0 100 100" fill="none"><rect width="100" height="100" rx="22" fill="#0f172a"/><defs><linearGradient id="bl" x1="50" y1="78" x2="26" y2="28" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#1e40af"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient><linearGradient id="br" x1="50" y1="78" x2="74" y2="28" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#1e40af"/><stop offset="60%" stop-color="#059669"/><stop offset="100%" stop-color="#10b981"/></linearGradient></defs><line x1="50" y1="78" x2="26" y2="28" stroke="url(#bl)" stroke-width="13" stroke-linecap="round"/><line x1="50" y1="78" x2="59.1" y2="59" stroke="url(#br)" stroke-width="13" stroke-linecap="round"/><circle cx="66.6" cy="43.5" r="6.5" fill="url(#br)"/><circle cx="74" cy="28" r="6.5" fill="url(#br)"/></svg>
    <span class="nav-logo-text">Vigil<span>Digital</span></span>
  </a>
  <div class="nav-links">
    <a href="/#por-que-yo" class="nav-link">Por qué yo</a>
    <a href="/#servicios" class="nav-link">Servicios</a>
    <a href="/#portfolio" class="nav-link">Portfolio</a>
    <a href="/#precios" class="nav-link">Precios</a>
    <a href="/blog" class="nav-link active">Blog</a>
    <a href="https://wa.me/34694201981" target="_blank" rel="noopener noreferrer" class="btn-nav-glass">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.119 1.535 5.854L.057 23.18a.75.75 0 00.923.923l5.326-1.478A11.95 11.95 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.93 0-3.74-.522-5.29-1.433l-.38-.225-3.24.9.9-3.24-.225-.38A9.946 9.946 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
      WhatsApp
    </a>
  </div>
  <button id="menu-btn" aria-label="Abrir menú">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
  </button>
</nav>

<div id="mobile-menu">
  <button id="close-menu-btn" aria-label="Cerrar menú">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <a href="/#por-que-yo" class="mobile-link">Por qué yo</a>
  <a href="/#servicios" class="mobile-link">Servicios</a>
  <a href="/#portfolio" class="mobile-link">Portfolio</a>
  <a href="/#precios" class="mobile-link">Precios</a>
  <a href="/blog" class="mobile-link active">Blog</a>
  <a href="https://wa.me/34694201981" target="_blank" rel="noopener noreferrer" class="btn-glass">WhatsApp</a>
</div>

<main class="page-wrap">
  <div class="blog-hero">
    <div class="container">
      <div class="sect-label fade-up">Blog</div>
      <h1 class="sect-title fade-up d1">Ideas que hacen<br>crecer negocios.</h1>
      <p class="sect-sub fade-up d2">Estrategia digital, diseño web y SEO para negocios locales que quieren destacar.</p>
      <div class="filter-bar fade-up d3" id="filter-bar">
        <button class="filter-btn active" data-cat="">Todos</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="blog-grid" id="blog-grid">
      <div class="blog-empty">Cargando artículos…</div>
    </div>
  </div>
</main>

<script>
  // Nav scroll
  const nav = document.getElementById('main-nav');
  window.addEventListener('scroll', () => { nav.classList.toggle('sc', window.scrollY > 50); }, { passive: true });

  // Mobile menu
  document.getElementById('menu-btn').addEventListener('click', () => document.getElementById('mobile-menu').classList.add('open'));
  document.getElementById('close-menu-btn').addEventListener('click', () => document.getElementById('mobile-menu').classList.remove('open'));
  document.querySelectorAll('.mobile-link').forEach(l => l.addEventListener('click', () => document.getElementById('mobile-menu').classList.remove('open')));

  // Scroll bar
  const bar = document.getElementById('scroll-bar');
  window.addEventListener('scroll', () => { bar.style.width = (window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100) + '%'; }, { passive: true });

  // Load posts
  let allPosts = [];

  function readTime(content) {
    return Math.max(1, Math.ceil(content.split(' ').length / 200));
  }

  function renderPosts(posts) {
    const grid = document.getElementById('blog-grid');
    if (!posts.length) {
      grid.innerHTML = '<div class="blog-empty">Todavía no hay artículos publicados. ¡Vuelve pronto!</div>';
      return;
    }
    grid.innerHTML = posts.map(p => `
      <a href="/blog/${p.slug}" class="post-card fade-up">
        <div class="post-card-cover">
          ${p.cover
            ? `<img src="/${p.cover}" alt="${p.title}" loading="lazy">`
            : `<div class="post-card-cover-placeholder"><svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1"><path d="M4 6h16M4 12h16M4 18h10"/></svg></div>`}
        </div>
        <div class="post-card-body">
          <span class="post-category">${p.category}</span>
          <div class="post-card-title">${p.title}</div>
          <div class="post-card-excerpt">${p.excerpt}</div>
          <div class="post-card-meta">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${new Date(p.date).toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' })}
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left:4px"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${p.readTime || readTime(p.content)} min de lectura
          </div>
          <span class="post-read-link">Leer artículo <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></span>
        </div>
      </a>
    `).join('');
  }

  function buildFilters(posts) {
    const cats = [...new Set(posts.map(p => p.category))];
    const bar  = document.getElementById('filter-bar');
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.cat = cat;
      btn.textContent = cat;
      bar.appendChild(btn);
    });
    bar.addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const cat = btn.dataset.cat;
      renderPosts(cat ? allPosts.filter(p => p.category === cat) : allPosts);
    });
  }

  fetch('/api/posts')
    .then(r => r.json())
    .then(data => {
      allPosts = data.posts || [];
      renderPosts(allPosts);
      buildFilters(allPosts);
    })
    .catch(() => {
      document.getElementById('blog-grid').innerHTML = '<div class="blog-empty">Error al cargar artículos.</div>';
    });
</script>
</body>
</html>
