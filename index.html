  const [sc, setSc] = useState(false);
  const [open, setOpen] = useState(false);
  const [active, setActive] = useState('');

  useEffect(() => {
    // Scroll fondo nav + scroll-spy sección activa
    const onScroll = () => {
      setSc(window.scrollY > 50);
      // Detectar qué sección está en viewport
      const ids = Object.values(SLUGS);
      let current = '';
      for (const id of ids) {
        const el = document.getElementById(id);
        if (el && el.getBoundingClientRect().top <= 120) current = id;
      }
      setActive(current);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  return (
    <nav className={sc ? 'sc' : ''} style={{ position:'fixed', top:0, left:0, right:0, zIndex:100, padding:'22px 40px', display:'flex', alignItems:'center', justifyContent:'space-between', transition:'background 0.3s, border-color 0.3s' }}>

      <div className="hidden md:flex" style={{ gap:32, alignItems:'center' }}>
        {NAV.map(l => {
          const slug = SLUGS[l];
          const isActive = active === slug;
          return (
            <a key={l} href={`#${slug}`}
              className="nav-link"
              style={{
                fontFamily:'Inter,sans-serif', fontSize:13, fontWeight: isActive ? 700 : 500,
                letterSpacing:'0.06em', textDecoration:'none',
                color: isActive ? '#5b72f7' : 'rgba(255,255,255,0.65)',
                position:'relative', transition:'color 0.2s',
              }}

              {isActive && <span style={{ position:'absolute', bottom:-6, left:0, right:0, height:2, background:'linear-gradient(90deg,#5b72f7,#10d4a0)', borderRadius:2 }}/>}
            </a>
          );
        })}
        <a href="https://wa.me/34694201981" target="_blank" rel="noopener noreferrer" className="btn-nav-glass"><WaIcon />WhatsApp</a>
      </div>
      <button className="md:hidden" onClick={() => setOpen(o=>!o)} style={{ background:'none', border:'none', color:'#fff', cursor:'pointer', padding:4 }}>
        {open
          ? <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>

/* ── App ── */
const App = () => {
  useEffect(() => {
    // Scroll bar
    const bar = document.getElementById('scroll-bar');
    const onScroll = () => { const p = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100; if(bar) bar.style.width = p + '%'; };
    window.addEventListener('scroll', onScroll);
    // Fade-up
    const io = new IntersectionObserver(entries => entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('vis'); io.unobserve(e.target); } }), { threshold: 0.1 });
    document.querySelectorAll('.fu').forEach(el => io.observe(el));
    // Cookie banner
    if(localStorage.getItem('vd_ck')) document.getElementById('ck-banner').classList.add('gone');

    // ── Twemoji: fuerza emojis estilo Apple en todos los sistemas operativos ──
    const twCfg = {
      folder: 'svg', ext: '.svg',
      base: 'https://cdn.jsdelivr.net/npm/twemoji@14.0.2/assets/',
      className: 'emoji',
    };

    // Desconectar observer → parsear → reconectar evita el bucle infinito
    let twTimer;
    let mo;
    const applyTwemoji = () => {
      if (typeof twemoji === 'undefined') return;
      mo.disconnect();                          // pausa: ignora los cambios de Twemoji
      twemoji.parse(document.body, twCfg);
      setTimeout(() => {                        // reconecta cuando el DOM ya está estable
        const root = document.getElementById('root');
        if (root) mo.observe(root, { childList: true, subtree: true });
      }, 50);
    };

    mo = new MutationObserver(() => {
      clearTimeout(twTimer);
      twTimer = setTimeout(applyTwemoji, 120);  // debounce: espera a que React termine
    });

    // Pasada inicial + arrancar observer
    applyTwemoji();

    return () => {
      window.removeEventListener('scroll', onScroll);
      mo.disconnect();
      clearTimeout(twTimer);
    };
  }, []);

  return <>
    <Nav />
    <Hero />
    <Stats />
    <WhyMe />
    <Services />
    <HowItWorks />
    <Pricing />
    <FAQ />
    <Contact />
    <Footer />
  </>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

  if (video && Hls.isSupported()) {
